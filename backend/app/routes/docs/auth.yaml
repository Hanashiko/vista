
paths:
  /v1/register:
    post:
      tags:
        - Authentication
      summary: User Registration
      description: Registers a new user with email, password, and optional name.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              email:
                type: string
                example: user@example.com
              password:
                type: string
                example: securepassword
              name:
                type: string
                example: John Doe
            required:
              - email
              - password
      responses:
        201:
          description: User registered successfully
          schema:
            type: object
            properties:
              message:
                type: string
                example: User registered successfully
        400:
          description: User already exists
          schema:
            type: object
            properties:
              error:
                type: string
                example: User already exists

  /v1/login:
    post:
      tags:
        - Authentication
      summary: User Login
      description: Authenticates a user and returns an access token and refresh token.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              email:
                type: string
                example: user@example.com
              password:
                type: string
                example: securepassword
            required:
              - email
              - password
      responses:
        200:
          description: User logged in successfully
          schema:
            type: object
            properties:
              message:
                type: string
                example: Logged in successfully
              access_token:
                type: string
                example: eyJhbGciOiJIUzI1...
              refresh_token:
                type: string
                example: eyJhbGciOiJIUzI1...
        401:
          description: Login failed
          schema:
            type: object
            properties:
              message:
                type: string
                example: Login failed

  /v1/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh Access Token
      description: Generates a new access token using a refresh token.
      security:
        - BearerAuth: []
      responses:
        200:
          description: New access token generated
          schema:
            type: object
            properties:
              access_token:
                type: string
                example: eyJhbGciOiJIUzI1...

  /v1/logout:
    post:
      tags:
        - Authentication
      summary: User Logout
      description: Logs out a user by revoking their current access token.
      security:
        - BearerAuth: []
      responses:
        200:
          description: User logged out successfully
          schema:
            type: object
            properties:
              message:
                type: string
                example: Logged out successfully
