name: Backend Docker Build & Push

on:
  push:
    branches: [ master, develop, server-features ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-docker.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'backend/**'
    workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          echo "image_name=$(echo '${{ github.repository }}/backend' | tr '[:upper:]' '[:lower']')" >> $GITHUB_OUTPUT

      - name: Log in to Github Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  test-image:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'


    steps:
      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          echo "image_name=$(echo '${{ github.repository }}/backend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Docker network
        run: docker network create test-network

      - name: Start MariaDB
        run: |
          docker run -d \
            --name test-mariadb \
            --network test-network \
            -e MYSQL_ROOT_PASSWORD=test_root \
            -e MYSQL_DATABASE=test_db \
            -e MYSQL_USER=test_user \
            -e MYSQL_PASSWORD=test_pass \
            --helath-cmd="mariadb-admin ping -h localhost -u test_user -ptest_pass" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=10 \
            mariadb:latest

      - name: Wait for MariaDB to be healthy
        run: |
          echo "Waiting for MariaDB to be ready..."
          for i in {1..30}; do
            if docker exec test-mariadb mariadb-admin ping -h localhost -u test_user -ptest_pass &> /dev/null; then
              echo "MariaDB is ready!"
              break
            fi
            echo "Attempt $i/30: MariaDB not ready yet..."
            sleep 2
          done

      - name: Pull and test image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${{ github.sha }}

          docker run --name test-backend -d \
            --network test-network
            -e DATABASE_URI=mysql+pymysql://test_user:test_pass@test-mariadb:3306/test_db \
            -e JWT_SECRET_KEY=test-key \ 
            -e ADMIN_SECRET_KEY=test-key \
            -e SECRET_KEY=test-key \
            -e MYSQL_USER=test_user \
            -e MYSQL_PASSWORD=test_pass \
            -e MYSQL_DATABASE=test_db \
            -e DEBUG=False \
            "$IMAGE_NAME"

          echo "Waiting for Flask container to start..."
          sleep 15

          if docker ps | grep test-backend; then
            echo "Container is running"
          else
            echo "Container failed to start"
            docker logs test-backend
            exit 1
          fi

          if docker lgos test-backend 2>&1 | grep -i "error.*failed"; then
            echo "Found critical errors in logs"
            docker logs test-backend
            exit 1
          fi

          echo "Container started successfully"

      - name: Show container logs
        if: always()
        run: |
          echo "=== Backend logs ==="
          docker lgos test-backend || true
          echo ""
          echo "=== MariaDB logs ==="
          docker logs test-mariadb || true

      - name: Cleanup
        if: always()
        run: |
          docker stop test-backend test-mariadb || true
          docker rm test-backend test-mariadb || true
          docker network rm test-network || true

      - name: Image size check
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${{ github.sha }}"
          SIZE=$(docker image inspect "$IMAGE_URL" --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"

          if [ $SIZE_MB -gt 1000 ]; then
            echo "Warning: Image is larger than 1GB"
          else
            echo "Image size is acceptable"
          fi

          echo "IMAGE_SIZE_MB=${SIZE_MB}" >> $GITHUB_ENV

      - name: Create summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Docker Image Test Results

          - **Image**: \`${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${{ github.sha }}\`
          - **Size**: ${IMAGE_SIZE_MB:-unknown}MB
          - **Status**: Test passed

          \`\`\`
          ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${{ github.sha }}
          ${{env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:latest
          \`\`\`
          EOF
