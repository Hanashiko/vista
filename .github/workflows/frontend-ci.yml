name: Frontend CI

on:
  push:
    branches:
      - master
      - develop
      - react-features
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

  pull_request:
    branches: [ master, develop ]
    paths:
      - 'frontend/**'

permissions:
  contents: read

jobs:
  test:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint code
        run: |
          cd frontend
          if grep -q "eslint" package.json; then
            npm run lint || true
          else
            echo "ESLint not configred, skipping"
          fi
        continue-on-error: true

      - name: Check code formatting
        run: |
          cd frontend
          npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css,scss,md}" || true
        continue-on-error: true

      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false
        env:
          CI: true

      - name: Check bundle size
        run: |
          cd frontend
          if [ -d "build" ]; then
            echo "Build size:"
            du -sh build/
            echo "JS bundle sizes:"
            find build/statis/js -name "*.js" -exec ls -lh {} \;
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create production Dockerfile
        run: |
          cd frontend
          if [ ! -f "Dockerfile" ]; then
            cat > Dockerfile << 'EOF'
          FROM node:20-alpine as build
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci
          COPY . .
          RUN npm run build

          FROM nginx:alpine
          COPY --from=build /app/build /usr/share/nginx/html
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF
          fi

      - name: Build Docker image
        run: |
          cd frontend
          docker build -t vista-frontend:test .

      - name: Test Docker image
        run: |
          docker images | grep vista-frontend
