name: Frontend CI

on:
  push:
    branches: [ prod, develop, react-features ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'frontend/**'

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Update browserslist database
        run: |
          cd frontend
          npx update-browserslist-db@latest
        continue-on-error: true

      - name: Lint code
        run: |
          cd frontend
          if grep -q "lint" package.json; then
            npm run lint || echo "Lint script not found or failed"
          else
            echo "ESLint not configured, skipping"
          fi
        continue-on-error: true

      - name: Check code formatting
        run: |
          cd frontend
          npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css,scss,md}" || true
        continue-on-error: true

      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false
        env:
          CI: true

      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7

      - name: Build application
        run: |
          cd frontend
          npm run build
        env:
          CI: true
          DISABLE_ESLINT_PLUGIN: true

      - name: Check bundle size
        run: |
          cd frontend
          echo "📦 Build size:"
          du -sh build/
          echo ""
          echo "📊 JS bundle sizes:"
          find build/static/js -name "*.js" -exec ls -lh {} \; 2>/dev/null || echo "No JS bundles found"
          echo ""
          echo "📊 CSS bundle sizes:"
          find build/static/css -name "*.css" -exec ls -lh {} \; 2>/dev/null || echo "No CSS bundles found"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

      - name: Create summary
        if: always()
        run: |
          cd frontend
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Frontend Build Summary

          ### Build Status
          - **Node version**: 20
          - **Build**: $([ -d "build" ] && echo "✅ Success" || echo "❌ Failed")
          - **Tests**: $([ -d "coverage" ] && echo "✅ Passed" || echo "⚠️  No coverage")

          ### Bundle Size
          $([ -d "build" ] && echo "\`\`\`" && du -sh build/ && echo "\`\`\`" || echo "Build directory not found")
          EOF
